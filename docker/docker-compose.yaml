# VibeVoice TTS API — Docker Compose
#
# Default (SDPA):
#   MODEL_PATH=vibevoice/VibeVoice-1.5B docker compose -f docker/docker-compose.yaml up -d
#
# With Flash Attention 2:
#   ATTN_IMPLEMENTATION=flash_attention_2 \
#     MODEL_PATH=vibevoice/VibeVoice-1.5B docker compose -f docker/docker-compose.yaml up -d
#
# Or set vars in .env:
#   echo "MODEL_PATH=vibevoice/VibeVoice-1.5B" > .env
#   echo "ATTN_IMPLEMENTATION=flash_attention_2" >> .env   # optional
#   docker compose -f docker/docker-compose.yaml up -d
#
# Notes:
#   - Requires nvidia-container-toolkit for GPU access
#   - Models are cached in a Docker named volume (persists across restarts)
#   - First start downloads model (~3-15 GB) into the vibevoice-models volume

services:
  vibevoice-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - ATTN_IMPLEMENTATION=${ATTN_IMPLEMENTATION:-sdpa}
    image: vibevoice-api:latest
    container_name: vibevoice-api
    restart: unless-stopped
    runtime: nvidia
    environment:
      # --- Required ---
      - MODEL_PATH=${MODEL_PATH:-vibevoice/VibeVoice-1.5B}

      # --- Server config ---
      - API_HOST=0.0.0.0
      - API_PORT=5000
      - WORKER_NUM=${WORKER_NUM:-1}
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-127.0.0.1}

      # --- Generation defaults ---
      - CFG_SCALE=${CFG_SCALE:-2.0}
      - SEED=${SEED:-42}
      - MAX_BATCH_SIZE=${MAX_BATCH_SIZE:-4}

      # --- Attention backend (flash_attention_2, sdpa, or eager) ---
      # Also drives Docker build: flash_attention_2 uses devel image + flash-attn
      - ATTN_IMPLEMENTATION=${ATTN_IMPLEMENTATION:-sdpa}

      # --- Model cache ---
      - HF_HOME=/app/hf-cache

      # --- Voice storage ---
      - SPEAKER_SAMPLES_DIR=/app/uploaded-voices
      - SPEAKER_MAX_UPLOADED=${SPEAKER_MAX_UPLOADED:-1000}

    ports:
      - "${API_PORT:-5000}:5000"

    volumes:
      - vibevoice-models:/app/hf-cache
      - ./demo/uploaded-voices:/app/uploaded-voices

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/v1/audio/voices"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - vibevoice

networks:
  vibevoice:
    name: vibevoice-net

volumes:
  vibevoice-models:
    name: vibevoice-models
