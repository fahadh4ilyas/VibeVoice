# VibeVoice TTS API — Docker Compose
#
# Start:
#   MODEL_PATH=vibevoice/VibeVoice-1.5B docker compose -f docker/docker-compose.yaml up -d
#
# Or set MODEL_PATH in .env:
#   echo "MODEL_PATH=vibevoice/VibeVoice-1.5B" > .env
#   docker compose -f docker/docker-compose.yaml up -d
#
# Notes:
#   - Requires nvidia-container-toolkit for GPU access
#   - First start downloads model (~3-15 GB) to the vibevoice-models volume

version: "3.8"

services:
  vibevoice-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: vibevoice-api:latest
    container_name: vibevoice-api
    restart: unless-stopped
    runtime: nvidia
    environment:
      # --- Required ---
      - MODEL_PATH=${MODEL_PATH:-vibevoice/VibeVoice-1.5B}

      # --- Server config ---
      - API_HOST=0.0.0.0
      - API_PORT=5000
      - WORKER_NUM=${WORKER_NUM:-1}
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-127.0.0.1}

      # --- Generation defaults ---
      - CFG_SCALE=${CFG_SCALE:-2.0}
      - SEED=${SEED:-42}
      - MAX_BATCH_SIZE=${MAX_BATCH_SIZE:-4}

      # --- Model cache ---
      - HF_HOME=/app/hf-cache
      - HF_HUB_ENABLE_HF_TRANSFER=${HF_HUB_ENABLE_HF_TRANSFER:-1}

      # --- Voice storage ---
      - SPEAKER_SAMPLES_DIR=/app/uploaded-voices
      - SPEAKER_MAX_UPLOADED=${SPEAKER_MAX_UPLOADED:-1000}

    ports:
      - "${API_PORT:-5000}:5000"

    volumes:
      # Persistent model cache (survives container rebuilds)
      - vibevoice-models:/app/hf-cache
      # Persistent uploaded voices
      - vibevoice-voices:/app/uploaded-voices

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/v1/audio/voices"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vibevoice-models:
    name: vibevoice-models
  vibevoice-voices:
    name: vibevoice-voices
